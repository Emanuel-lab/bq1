MEMORY {
    ZP:     start = $00,    size = $100,  type = rw, define = yes;
    RAM:    start = $200,   size = $600,  type = rw, define = yes;
    
    # iNES Header (Make sure your header reflects 16 CHR banks!)
    HEADER: start = $0,     size = $10,   file = %O, fill = yes;

    # PRG-ROM (Adjusted for a larger project base, e.g., 32KB NROM/MMC1 base)
    PRG:    start = $8000,  size = $8000, file = %O, fill = yes, define = yes;

    # THE FIX: Expanded from $2000 (8KB) to $20000 (128KB)
    CHR:    start = $0000,  size = $20000, file = %O, fill = yes;
}

SEGMENTS {
    HEADER:   load = HEADER, type = ro;
    STARTUP:  load = PRG,    type = ro,  define = yes;
    LOWCODE:  load = PRG,    type = ro,  optional = yes;
    INIT:     load = PRG,    type = ro,  optional = yes;
    CODE:     load = PRG,    type = ro,  define = yes;
    RODATA:   load = PRG,    type = ro,  define = yes;
    DATA:     load = PRG,    run = RAM,  type = rw,  define = yes;
    BSS:      load = RAM,    type = bss, define = yes;
    ZEROPAGE: load = ZP,     type = zp;
    
    # This maps your massive 'CHARS' segment to the newly enlarged CHR area
    CHARS:    load = CHR,    type = ro;
}

